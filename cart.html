<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart – Yarnia</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="header-top">
      <div class="brand-group">
        <span class="brand-mark" role="img" aria-label="Yarnia">🧶</span>
        <div class="brand-text">
          <h1><a href="index.html">Yarnia</a></h1>
        </div>
      </div>
      <nav class="top-nav">
        <a href="contact.html">📞 Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="cart-box">
      <h1>Your Cart</h1>
      <table id="cart-items-table" style="width:100%;border-collapse:collapse;">
        <thead>
          <tr id="cart-header" style="display:none">
            <th>Item</th><th>Price</th><th>Qty</th><th>Subtotal</th><th></th>
          </tr>
        </thead>
        <tbody id="cart-items"></tbody>
      </table>
      <p class="cart-total" id="cart-total"></p>

      <div class="promo-input-row">
        <input type="text" id="promo-input" placeholder="Have a promo code? Enter it here" oninput="this.value=this.value.toUpperCase()">
        <button onclick="applyPromo()">Apply</button>
      </div>
      <p id="promo-msg" style="font-size:0.85rem;margin:6px 0 0;"></p>
      <p class="cart-total" id="cart-total-discounted" style="display:none;color:var(--green);font-weight:600;"></p>

      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:20px;">
        <button class="btn-cart" onclick="checkoutWhatsApp()">Order via WhatsApp</button>
        <button class="btn-cart" style="background:transparent;color:var(--mocha);border:1.5px solid var(--mocha);" onclick="clearCart()">Clear Cart</button>
      </div>
      <p style="margin-top:16px;font-size:0.85rem;opacity:0.65;">All orders are made to order. We'll confirm and arrange payment via WhatsApp or bank transfer.</p>
    </div>
  </main>

  <footer>
    <a href="https://instagram.com/the.yarnia_" target="_blank" rel="noopener">📸 Instagram</a>
    <span class="sep">·</span>
    <a href="https://wa.me/923328234439" target="_blank" rel="noopener">💬 WhatsApp</a>
    <span class="sep">·</span>
    <span>Made with ♡ in Karachi · 2026</span>
  </footer>

  <div class="toast" id="toast"></div>
  <script src="cart.js"></script>
  <script>
    let discountApplied = false;
    let discountAmount = 0;

    function applyPromo() {
      const code = document.getElementById('promo-input').value.trim().toUpperCase();
      const msg = document.getElementById('promo-msg');
      if (code !== 'YARNIA') {
        msg.style.color = '#c0392b';
        msg.textContent = '✕ Invalid promo code.';
        return;
      }
      if (discountApplied) {
        msg.style.color = '#c0392b';
        msg.textContent = '✕ Code already applied.';
        return;
      }
      const cart = getCart();
      if (!cart.length) { msg.style.color = '#c0392b'; msg.textContent = '✕ Your cart is empty!'; return; }
      const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
      discountAmount = Math.round(subtotal * 0.10);
      discountApplied = true;
      msg.style.color = '#27ae60';
      msg.textContent = '✓ Code applied! You save Rs. ' + discountAmount.toLocaleString();
      const grandTotal = subtotal + DELIVERY_CHARGE - discountAmount;
      document.getElementById('cart-total').style.textDecoration = 'line-through';
      document.getElementById('cart-total').style.opacity = '0.5';
      const d = document.getElementById('cart-total-discounted');
      d.style.display = '';
      d.textContent = 'Total after discount: Rs. ' + grandTotal.toLocaleString();
    }

    function checkoutWhatsApp() {
      const cart = getCart();
      if (!cart.length) { alert('Your cart is empty!'); return; }
      const lines = cart.map(function(i) {
        return '• ' + i.name + ' x' + i.qty + ' = Rs. ' + (i.price * i.qty).toLocaleString();
      }).join('\n');
      const subtotal = cart.reduce(function(s, i) { return s + i.price * i.qty; }, 0);
      const finalTotal = subtotal + DELIVERY_CHARGE - (discountApplied ? discountAmount : 0);
      const discountLine = discountApplied ? '\nDiscount (YARNIA 10%): -Rs. ' + discountAmount.toLocaleString() : '';
      const message = 'Hi Yarnia! I would like to order:\n\n' + lines + '\n\nSubtotal: Rs. ' + subtotal.toLocaleString() + '\nDelivery: Rs. 300' + discountLine + '\nTotal: Rs. ' + finalTotal.toLocaleString() + '\n\nPlease confirm!';
      window.open('https://wa.me/923328234439?text=' + encodeURIComponent(message), '_blank');
    }
  </script>
</body>
</html>
