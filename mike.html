<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crochet Mike Wazowski - Yarnia</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="header-top">
      <h1><a href="index.html" style="text-decoration:none;color:inherit;">Yarnia</a></h1>

        <a href="cart.html">🛒 View Cart</a>

  <main>
    <div class="product-detail">

        <h1>Crochet Mike Wazowski</h1>

        <button onclick="addToCart('Crochet Mike Wazowski', 1500)">Add to Cart</button>

    </div>

  <footer>
    <p>© 2025 Yarnia · Made with ♡ in Karachi</p>
