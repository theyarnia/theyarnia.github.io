<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

</head>
<body>
  <header>
    <div class="header-top">
      <h1><a href="index.html" style="text-decoration:none;color:inherit;">Yarnia</a></h1>

        <button onclick="addToCart('Crochet Bunny', 3000)">Add to Cart</button>

  <footer>
